{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FERVER BRASIL{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'ferver/style.css' %}">
<style>

:root {
    --bg-color: #000000;
    --text-color: #ffffff;
    --card-bg: #0d1b2a;
    --card-text: #ffffff;
    --detail-text: #cccccc;
    --search-bg: #111d30;
    --select-bg: #1f2e46;
    --select-text: #ffffff;
    --footer-bg: #000000;
}

.light-mode {
    --bg-color: #f4f4f9;
    --text-color: #333333;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:var(--bg-color);
color:var(--text-color);
transition: background 0.3s, color 0.3s;
display: flex;
flex-direction: column;
min-height: 100vh;
}

/* HEADER */

header{
background:linear-gradient(90deg,#ff6a00 0%, #ff6a00 50%, #ffffff 100%);
padding:20px 40px; /* reduced more */
display:flex;
align-items:center;
justify-content:flex-start; /* align to left */
position: relative;
z-index: 100;
}

.logo{
font-size:48px;
font-weight:800;
letter-spacing:2px;
margin-left:6cm; /* move logo right */
text-shadow: 2px 2px 4px rgba(0,0,0,0.5); /* add shadow */
font-family: 'Oswald', sans-serif;
color: #fff;
}
.header-buttons{
    margin-left: 21cm; /* even more space from logo */
}

.header-buttons button{
background:#fff; /* white box */
color:#ff6a00; /* orange text */
border:2px solid #ff6a00; /* orange border */
padding:10px 20px;
border-radius:20px;
margin-left:10px;
cursor:pointer;
font-weight:600;
}

/* CONTAINER */

.container{
width:1400px;
margin:auto;
margin-top:40px;
margin-bottom:20px;
flex: 1; /* Faz o container crescer para empurrar o rodapé para baixo */
}

/* FOOTER */

.footer{
background: #0d1b2a; /* Dark blue from the theme */
color: #8899a6; /* Softer text color */
text-align: center;
padding: 30px 20px;
font-size: 14px;
border-top: 1px solid #2a3b4d; /* Subtle separator */
margin-top: 0; /* Space above footer */
}

.footer p {
    margin: 8px 0;
}

.footer .warning {
    font-weight: bold;
    color: #ff6a00; /* Theme orange */
    text-transform: uppercase;
    letter-spacing: 1px;
}

/* MODAL FALE CONOSCO */
.modal {
    display: none; 
    position: fixed; 
    z-index: 1000; 
    left: 0;
    top: 0;
    width: 100%; 
    height: 100%; 
    overflow: auto; 
    background-color: rgba(0,0,0,0.8); 
    backdrop-filter: blur(5px);
}

/* MINIBLOG */

</style>
</head>
<body>

<header class="main-header">
    <div class="max-w-7xl mx-auto px-4 py-3">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-white select-none" style="font-size: 2.8rem; font-weight: 900; letter-spacing: 0.05em; text-shadow: 0 2px 12px rgba(0,0,0,0.3); font-family: Impact, Arial Black, sans-serif;">FERVER BRASIL</span>
            </div>
            <div class="header-actions">
            </div>
        </div>
    </div>
</header>

<main>
    {% block content %}{% endblock %}
</main>

</body>
</html>
