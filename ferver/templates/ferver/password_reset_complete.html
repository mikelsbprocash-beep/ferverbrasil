<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Senha Alterada - Fever Brasil</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
<style>
    body { margin: 0; font-family: Arial, sans-serif; background: #000; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .container { background: #0d1b2a; padding: 40px; border-radius: 15px; border: 2px solid #0bbf4f; width: 100%; max-width: 400px; text-align: center; }
    h1 { font-family: 'Oswald', sans-serif; color: #0bbf4f; text-transform: uppercase; }
    p { color: #ccc; font-size: 16px; margin-bottom: 30px; }
    button { width: 100%; background: #ff6a00; color: #fff; border: none; padding: 15px; font-weight: bold; border-radius: 30px; cursor: pointer; text-transform: uppercase; }
    button:hover { background: #ff4500; }
</style>
</head>
<body>
    <div class="container">
        <h1>Sucesso!</h1>
        <p>Sua senha foi alterada com sucesso. Você já pode entrar na sua conta.</p>
        <button onclick="window.location.href='/login/'">Fazer Login</button>
    </div>
</body>
</html>
