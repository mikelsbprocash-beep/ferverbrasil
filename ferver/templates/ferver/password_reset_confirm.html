<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Nova Senha - Fever Brasil</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
<style>
    body { margin: 0; font-family: Arial, sans-serif; background: #000; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .container { background: #0d1b2a; padding: 40px; border-radius: 15px; border: 2px solid #ff6a00; width: 100%; max-width: 400px; text-align: center; }
    h1 { font-family: 'Oswald', sans-serif; color: #ff6a00; text-transform: uppercase; }
    p { color: #ccc; font-size: 14px; margin-bottom: 20px; }
    /* Estilizando os inputs gerados pelo Django */
    input { width: 100%; padding: 15px; margin-bottom: 15px; background: #111d30; border: 1px solid #333; border-radius: 8px; color: #fff; box-sizing: border-box; }
    ul { list-style: none; padding: 0; color: #ff4444; font-size: 12px; text-align: left; }
    label { display: none; } /* Esconde labels padrão */
    button { width: 100%; background: #ff6a00; color: #fff; border: none; padding: 15px; font-weight: bold; border-radius: 30px; cursor: pointer; text-transform: uppercase; }
    button:hover { background: #ff4500; }
    .helptext { display: none; }
</style>
</head>
<body>
    <div class="container">
        <h1>Nova Senha</h1>
        <p>Digite sua nova senha abaixo.</p>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Alterar Senha</button>
        </form>
    </div>
</body>
</html>
