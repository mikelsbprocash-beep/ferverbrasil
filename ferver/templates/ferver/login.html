<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login - Fever Brasil</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
<style>
    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #000000;
        color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
    }
    .login-container {
        background: #0d1b2a;
        padding: 40px;
        border-radius: 15px;
        border: 2px solid #ff6a00;
        box-shadow: 0 0 30px rgba(255, 106, 0, 0.2);
        width: 100%;
        max-width: 400px;
        text-align: center;
    }
    h1 {
        font-family: 'Oswald', sans-serif;
        color: #ff6a00;
        font-size: 32px;
        margin-bottom: 30px;
        text-transform: uppercase;
    }
    input {
        width: 100%;
        padding: 15px;
        margin-bottom: 15px;
        background: #111d30;
        border: 1px solid #333;
        border-radius: 8px;
        color: #fff;
        box-sizing: border-box;
        font-size: 16px;
    }
    input:focus {
        border-color: #ff6a00;
        outline: none;
    }
    button {
        width: 100%;
        background: #ff6a00;
        color: #fff;
        border: none;
        padding: 15px;
        font-size: 18px;
        font-weight: bold;
        border-radius: 30px;
        cursor: pointer;
        transition: transform 0.2s;
        text-transform: uppercase;
        margin-top: 10px;
    }
    button:hover {
        transform: scale(1.02);
        background: #ff4500;
    }
    .links {
        margin-top: 20px;
        font-size: 14px;
    }
    .links a {
        color: #ccc;
        text-decoration: none;
    }
    .links a:hover {
        color: #ff6a00;
    }
    .erro { color: #ff4444; margin-bottom: 15px; }
</style>
</head>
<body>
    <div class="login-container">
        <h1>Entrar</h1>
        {% if erro %}<div class="erro">{{ erro }}</div>{% endif %}
        <form method="POST">
            {% csrf_token %}
            <input type="email" name="email" placeholder="Seu E-mail" required>
            <input type="password" name="senha" placeholder="Sua Senha" required>
            <button type="submit">Acessar Conta</button>
        </form>
        <div class="links">
            <a href="/cadastro/">Não tem conta? Cadastre-se</a>
            <br><br>
            <a href="{% url 'password_reset' %}" style="font-size: 12px; color: #888;">Esqueci minha senha</a>
        </div>
    </div>
</body>
</html>
