<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pagamento Confirmado - Fever Brasil</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
<style>
    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #000000;
        color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
    }
    .container {
        background: #0d1b2a;
        padding: 40px;
        border-radius: 15px;
        border: 2px solid #0bbf4f; /* Verde sucesso */
        box-shadow: 0 0 30px rgba(11, 191, 79, 0.3);
        max-width: 500px;
    }
    h1 {
        font-family: 'Oswald', sans-serif;
        color: #0bbf4f;
        font-size: 36px;
        margin-bottom: 10px;
        text-transform: uppercase;
    }
    p {
        font-size: 18px;
        color: #cccccc;
        line-height: 1.5;
        margin-bottom: 30px;
    }
    .icon {
        font-size: 60px;
        margin-bottom: 20px;
        display: block;
    }
    button {
        background: #ff6a00;
        color: #fff;
        border: none;
        padding: 15px 30px;
        font-size: 18px;
        font-weight: bold;
        border-radius: 30px;
        cursor: pointer;
        transition: transform 0.2s;
        text-transform: uppercase;
    }
    button:hover {
        transform: scale(1.05);
        background: #ff4500;
    }
</style>
</head>
<body>
    <div class="container">
        <span class="icon">✅</span>
        <h1>Pagamento Confirmado!</h1>
        <p>Obrigado! Seu pagamento foi processado com sucesso.<br>Seu plano já está ativo e seu perfil foi atualizado.</p>
        <button onclick="window.location.href='/'">Voltar para o Início</button>
    </div>
</body>
</html>
